<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Acompanhamento de dieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #f97316;
            --primary-pink: #ec4899;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fffaf5 0%, #fff1f2 100%);
            min-height: 100vh;
            color: #1e293b;
            touch-action: manipulation;
            padding-top: env(safe-area-inset-top, 20px);
        }
        
        input, select, textarea, button { font-size: 16px !important; }

        .content-width {
            width: 92%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Dashboard Sticky Logic */
        #sticky-header {
            position: sticky;
            top: env(safe-area-inset-top, 20px);
            z-index: 50;
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2rem;
            box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.1);
        }

        /* Layout Reduzido Corrigido: Gráfico à esquerda, Texto à direita */
        .shrunk #dashboard-card {
            padding: 0.6rem 1.25rem !important;
            border-radius: 1.5rem;
        }

        .shrunk #dashboard-inner {
            flex-direction: row !important;
            justify-content: space-between !important;
            align-items: center !important;
        }

        .shrunk #score-svg-container {
            width: 54px !important;
            height: 54px !important;
            margin-bottom: 0 !important;
            margin-left: 0 !important;
        }

        .shrunk #score-val {
            font-size: 1.1rem !important;
        }

        .shrunk #dashboard-title, 
        .shrunk #score-msg, 
        .shrunk #stats-row {
            display: none !important;
        }

        .shrunk #mini-info {
            display: flex !important;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.6s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .fluid-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: #ffe4e6;
            border-radius: 20px;
            outline: none;
        }

        .fluid-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, var(--primary-orange), var(--primary-pink));
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3);
        }

        .nav-btn.active {
            color: var(--primary-pink);
            background: #fff1f2;
        }

        .calendar-day {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .meal-card { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-36">

    <!-- ABA: HOJE -->
    <div id="view-today" class="view-section space-y-4">
        
        <header class="content-width flex justify-between items-center pt-4 pb-2">
            <div>
                <h1 class="text-2xl font-black bg-gradient-to-r from-orange-500 to-pink-600 bg-clip-text text-transparent">Acompanhamento de dieta</h1>
                <p id="display-date" class="text-xs text-slate-400 font-bold uppercase tracking-tight"></p>
            </div>
            <!-- Botão Reset Estilizado -->
            <button onclick="resetDaily()" class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-md text-orange-600 border border-orange-200 active:scale-95 transition-all z-50">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
        </header>

        <!-- DASHBOARD STICKY -->
        <div id="sticky-header" class="content-width">
            <div id="dashboard-card" class="glass-card p-6 transition-all duration-300">
                <h2 id="dashboard-title" class="text-[10px] font-black text-center text-slate-400 uppercase tracking-[0.2em] mb-4">Índice de Disciplina</h2>
                
                <div id="dashboard-inner" class="flex flex-col items-center justify-center w-full transition-all duration-300">
                    <!-- Gráfico circular (Esquerda no modo reduzido) -->
                    <div id="score-svg-container" class="relative w-36 h-36 mb-2 transition-all duration-300">
                        <svg class="w-full h-full" viewBox="0 0 100 100">
                            <circle class="text-orange-50" stroke-width="10" stroke="currentColor" fill="transparent" r="42" cx="50" cy="50" />
                            <circle id="score-circle" class="text-pink-500 progress-ring-circle" stroke-width="10" stroke-dasharray="263.89" stroke-dashoffset="263.89" stroke-linecap="round" stroke="currentColor" fill="transparent" r="42" cx="50" cy="50" />
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span id="score-val" class="text-4xl font-black text-slate-800 tracking-tighter transition-all">0%</span>
                            <span id="score-msg" class="text-[9px] font-bold uppercase tracking-widest text-pink-400 mt-0.5">Status</span>
                        </div>
                    </div>

                    <!-- Informações (Direita no modo reduzido) -->
                    <div id="mini-info" class="hidden">
                        <span id="mini-status-text" class="text-[11px] font-black uppercase text-pink-500">Status do Dia</span>
                        <div class="flex flex-col text-[12px] font-bold text-slate-600 leading-tight mt-1">
                            <span id="mini-attainment">Média: 0%</span>
                            <span id="mini-penalty" class="text-red-500">Saídas: 0</span>
                        </div>
                    </div>
                </div>

                <!-- Estatísticas Detalhadas -->
                <div id="stats-row" class="mt-4 pt-4 border-t border-slate-100 flex justify-around">
                    <div class="text-center">
                        <p id="stats-raw" class="text-lg font-black text-orange-500 leading-none">0%</p>
                        <p class="text-[8px] font-bold text-slate-400 uppercase mt-1">Atingimento</p>
                    </div>
                    <div class="text-center">
                        <p id="stats-penalty" class="text-lg font-black text-red-500 leading-none">0%</p>
                        <p class="text-[8px] font-bold text-slate-400 uppercase mt-1">Penalidade</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- REFEIÇÕES -->
        <div id="meals-container" class="content-width space-y-3"></div>

        <!-- SAÍDAS -->
        <div class="content-width glass-card p-5 border-2 border-dashed border-orange-200">
            <h3 class="font-bold text-sm text-slate-700 mb-3 flex items-center gap-2">🍔 Saídas da Dieta <span class="text-[9px] text-red-400 font-black">(-10% CADA)</span></h3>
            <div class="flex gap-2">
                <input type="text" id="slip-input" placeholder="O que escapou?" class="flex-1 px-4 py-2.5 rounded-xl border-none ring-1 ring-slate-100 focus:ring-pink-400 outline-none text-sm bg-white/50">
                <button onclick="addSlip()" class="bg-gradient-to-r from-orange-500 to-pink-500 text-white px-5 rounded-xl font-bold shadow-md active:scale-95 transition-transform text-sm">Add</button>
            </div>
            <div id="slips-list" class="mt-3 space-y-2"></div>
        </div>
    </div>

    <!-- ABA: HISTÓRICO -->
    <div id="view-history" class="view-section content-width hidden py-6">
        <header class="mb-6">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Histórico</h1>
            <p class="text-sm text-slate-500 font-medium">Sua evolução semanal</p>
        </header>
        <div class="glass-card p-5 shadow-lg mb-6">
            <div class="flex justify-between items-center mb-6">
                <h3 id="cal-month-title" class="font-black text-slate-700 capitalize">Mês</h3>
                <div class="flex gap-2">
                    <button onclick="navMonth(-1)" class="p-2 bg-slate-50 rounded-lg transition">‹</button>
                    <button onclick="navMonth(1)" class="p-2 bg-slate-50 rounded-lg transition">›</button>
                </div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 text-center"></div>
        </div>
        <div id="history-detail" class="hidden glass-card p-6 animate-in fade-in space-y-4">
            <div class="flex justify-between items-start">
                <div>
                    <p id="det-date" class="text-[10px] font-black text-slate-400 uppercase"></p>
                    <h4 class="text-2xl font-black text-slate-800" id="det-score">0%</h4>
                    <p class="text-[10px] font-bold text-slate-400" id="det-math"></p>
                </div>
                <div id="det-status-chip" class="px-3 py-1 rounded-full text-[9px] font-bold text-white uppercase tracking-widest">Status</div>
            </div>
            <div id="det-meals-grid" class="grid grid-cols-1 gap-2 border-t pt-4"></div>
            <div id="det-slips-section" class="border-t pt-4">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Saídas Registradas</p>
                <div id="det-slips-list" class="flex flex-wrap gap-2"></div>
            </div>
        </div>
    </div>

    <!-- NAVEGAÇÃO INFERIOR -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 content-width px-1 z-50">
        <div class="glass-card shadow-2xl p-1.5 flex items-center bg-white/95 w-full">
            <button onclick="changeTab('today')" id="tab-today" class="nav-btn active flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl transition-all">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="text-[9px] font-black uppercase tracking-widest">Hoje</span>
            </button>
            <button onclick="changeTab('history')" id="tab-history" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl transition-all text-slate-300">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span class="text-[9px] font-black uppercase tracking-widest">Histórico</span>
            </button>
        </div>
    </nav>

    <script>
        const STORAGE_KEY = 'diet_tracker_v13_db';
        const MEALS_CONFIG = [
            { id: 'cafe', name: 'Café da Manhã', icon: '☕' },
            { id: 'colacao', name: 'Colação', icon: '🍎' },
            { id: 'almoco', name: 'Almoço', icon: '🍛' },
            { id: 'lanche15', name: 'Lanche 15h', icon: '🥪' },
            { id: 'lanche18', name: 'Lanche 18h', icon: '🥤' },
            { id: 'jantar', name: 'Jantar', icon: '🍲' },
            { id: 'ceia', name: 'Ceia', icon: '🥛' }
        ];

        let database = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        let viewMonth = new Date();

        function getDayKey(d = new Date()) {
            return d.toISOString().split('T')[0];
        }

        let todayKey = getDayKey();
        let todayData = database[todayKey] || { meals: {}, slips: [] };

        // Lógica de Scroll - Dashboard Encolhido Horizontal
        window.addEventListener('scroll', () => {
            const header = document.getElementById('sticky-header');
            if (window.scrollY > 40) {
                header.classList.add('shrunk');
            } else {
                header.classList.remove('shrunk');
            }
        });

        function save() {
            const scores = calculateScores();
            todayData.score = scores.finalScore;
            todayData.rawAttainment = scores.rawAttainment;
            database[todayKey] = todayData;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(database));
            updateScoresUI();
        }

        function calculateScores() {
            const progSum = MEALS_CONFIG.reduce((acc, m) => acc + (todayData.meals[m.id]?.progress || 0), 0);
            const rawAttainment = Math.round(progSum / MEALS_CONFIG.length);
            const penalty = todayData.slips.length * 10;
            const finalScore = Math.max(0, rawAttainment - penalty);
            return { rawAttainment, penalty, finalScore };
        }

        function updateScoresUI() {
            const { rawAttainment, penalty, finalScore } = calculateScores();
            const circumference = 263.89; 
            
            const circle = document.getElementById('score-circle');
            circle.style.strokeDashoffset = circumference - (finalScore / 100 * circumference);
            
            document.getElementById('score-val').innerText = `${finalScore}%`;
            document.getElementById('stats-raw').innerText = `${rawAttainment}%`;
            document.getElementById('stats-penalty').innerText = `-${penalty}%`;

            document.getElementById('mini-attainment').innerText = `Média: ${rawAttainment}%`;
            document.getElementById('mini-penalty').innerText = `Saídas: ${todayData.slips.length}`;

            const msg = document.getElementById('score-msg');
            const miniMsg = document.getElementById('mini-status-text');
            
            let statusText = "Foco";
            let statusColor = "#ec4899"; 

            if (finalScore >= 75) { statusText = "Excelente! 🌟"; statusColor = "#10b981"; }
            else if (finalScore >= 50) { statusText = "Bom Caminho 💪"; statusColor = "#f59e0b"; }
            else { statusText = "Atenção 🎯"; statusColor = "#ef4444"; }

            msg.innerText = statusText;
            msg.style.color = statusColor;
            miniMsg.innerText = statusText;
            miniMsg.style.color = statusColor;
        }

        function renderTodayUI() {
            document.getElementById('display-date').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'short' });
            const container = document.getElementById('meals-container');
            container.innerHTML = '';

            MEALS_CONFIG.forEach(meal => {
                const mData = todayData.meals[meal.id] || { progress: 0 };
                const card = document.createElement('div');
                card.className = `glass-card p-5 meal-card`;
                card.innerHTML = `
                    <div class="flex items-center gap-3 mb-3">
                        <span class="text-xl">${meal.icon}</span>
                        <div>
                            <h4 class="font-bold text-slate-700 text-sm">${meal.name}</h4>
                            <p class="text-[10px] font-black text-slate-300 uppercase">Atingimento: <span class="meal-perc text-orange-500">${mData.progress}</span>%</p>
                        </div>
                    </div>
                    <input type="range" min="0" max="100" step="5" value="${mData.progress}" 
                        class="fluid-slider" 
                        oninput="window.liveUpdate('${meal.id}', this.value)"
                        onchange="window.saveMealProgress()">
                `;
                container.appendChild(card);
            });
            renderSlipsList();
        }

        function renderSlipsList() {
            const list = document.getElementById('slips-list');
            list.innerHTML = '';
            todayData.slips.forEach(s => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white/60 p-3 rounded-xl border border-orange-50 text-xs shadow-sm";
                div.innerHTML = `<span class="font-bold text-slate-600">${s.text}</span><button onclick="window.removeSlip(${s.id})" class="text-pink-400 p-1 font-bold">✕</button>`;
                list.appendChild(div);
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('cal-month-title');
            grid.innerHTML = '';
            const y = viewMonth.getFullYear();
            const m = viewMonth.getMonth();
            title.innerText = viewMonth.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
            const first = new Date(y, m, 1).getDay();
            const total = new Date(y, m + 1, 0).getDate();
            
            const daysHead = ['D','S','T','Q','Q','S','S'];
            daysHead.forEach(d => {
                const h = document.createElement('div');
                h.className = "text-[9px] font-black text-slate-300 uppercase mb-2";
                h.innerText = d;
                grid.appendChild(h);
            });

            for (let i = 0; i < first; i++) grid.appendChild(document.createElement('div'));

            for (let d = 1; d <= total; d++) {
                const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const data = database[key];
                const day = document.createElement('div');
                day.className = "calendar-day bg-white shadow-sm border border-slate-50";
                day.innerHTML = `<span>${d}</span><div class="day-indicator"></div>`;
                const indicator = day.querySelector('.day-indicator');
                if (data) {
                    const score = data.score || 0;
                    if (score >= 75) { day.style.backgroundColor = '#ecfdf5'; day.style.borderColor = '#10b981'; day.style.color = '#065f46'; indicator.style.backgroundColor = '#10b981'; }
                    else if (score >= 50) { day.style.backgroundColor = '#fffbeb'; day.style.borderColor = '#f59e0b'; day.style.color = '#92400e'; indicator.style.backgroundColor = '#f59e0b'; }
                    else { day.style.backgroundColor = '#fef2f2'; day.style.borderColor = '#ef4444'; day.style.color = '#991b1b'; indicator.style.backgroundColor = '#ef4444'; }
                    day.onclick = () => showDetail(key, data);
                } else { day.classList.add('opacity-30', 'text-slate-400'); }
                grid.appendChild(day);
            }
        }

        function showDetail(key, data) {
            const det = document.getElementById('history-detail');
            det.classList.remove('hidden');
            document.getElementById('det-date').innerText = new Date(key + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long' });
            const final = data.score || 0;
            const raw = data.rawAttainment || 0;
            const penalty = raw - final;
            document.getElementById('det-score').innerText = `${final}% Disciplina`;
            document.getElementById('det-math').innerText = `Média: ${raw}% | Pen.: -${penalty}%`;
            const statusChip = document.getElementById('det-status-chip');
            if (final >= 75) { statusChip.innerText = "Excelente"; statusChip.style.backgroundColor = "#10b981"; }
            else if (final >= 50) { statusChip.innerText = "Médio"; statusChip.style.backgroundColor = "#f59e0b"; }
            else { statusChip.innerText = "Baixo"; statusChip.style.backgroundColor = "#ef4444"; }
            const mealsGrid = document.getElementById('det-meals-grid');
            mealsGrid.innerHTML = '';
            MEALS_CONFIG.forEach(m => {
                const val = data.meals?.[m.id]?.progress || 0;
                const row = document.createElement('div');
                row.className = "flex justify-between items-center bg-slate-50 p-3 rounded-xl";
                row.innerHTML = `<div class="flex items-center gap-2"><span>${m.icon}</span><span class="text-xs font-bold text-slate-600">${m.name}</span></div><span class="text-xs font-black text-orange-500">${val}%</span>`;
                mealsGrid.appendChild(row);
            });
            const slipsSection = document.getElementById('det-slips-section');
            const slipsList = document.getElementById('det-slips-list');
            slipsList.innerHTML = '';
            if (data.slips && data.slips.length > 0) {
                slipsSection.classList.remove('hidden');
                data.slips.forEach(s => {
                    const chip = document.createElement('span');
                    chip.className = "px-3 py-1 bg-red-100 text-red-700 text-[9px] font-bold rounded-full uppercase tracking-tighter";
                    chip.innerText = s.text;
                    slipsList.appendChild(chip);
                });
            } else { slipsSection.classList.add('hidden'); }
            det.scrollIntoView({ behavior: 'smooth' });
        }

        window.liveUpdate = (id, val) => {
            const card = document.querySelector(`[oninput*="${id}"]`).closest('.meal-card');
            card.querySelector('.meal-perc').innerText = val;
            if(!todayData.meals[id]) todayData.meals[id] = { progress: 0 };
            todayData.meals[id].progress = parseInt(val);
            updateScoresUI();
        };

        window.saveMealProgress = () => { save(); };

        window.addSlip = () => {
            const input = document.getElementById('slip-input');
            if (input.value.trim()) {
                todayData.slips.unshift({ id: Date.now(), text: input.value.trim() });
                input.value = '';
                renderTodayUI();
                save();
            }
        };

        window.removeSlip = (id) => {
            todayData.slips = todayData.slips.filter(s => s.id !== id);
            renderTodayUI();
            save();
        };

        window.changeTab = (tab) => {
            const isToday = tab === 'today';
            document.getElementById('view-today').classList.toggle('hidden', !isToday);
            document.getElementById('view-history').classList.toggle('hidden', isToday);
            document.getElementById('tab-today').classList.toggle('active', isToday);
            document.getElementById('tab-history').classList.toggle('active', !isToday);
            document.getElementById('tab-today').classList.toggle('text-slate-300', !isToday);
            document.getElementById('tab-history').classList.toggle('text-slate-300', isToday);
            if (!isToday) renderCalendar();
        };

        window.navMonth = (dir) => {
            viewMonth.setMonth(viewMonth.getMonth() + dir);
            renderCalendar();
        };

        window.resetDaily = () => {
            if (confirm("Deseja limpar todos os dados de hoje?")) {
                todayData = { meals: {}, slips: [] };
                save();
                renderTodayUI();
            }
        };

        // INIT
        renderTodayUI();
        updateScoresUI();
    </script>
</body>
</html>
