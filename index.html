<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Acompanhamento de dieta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #f97316;
            --primary-pink: #ec4899;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fffaf5 0%, #fff1f2 100%);
            min-height: 100vh;
            color: #1e293b;
            touch-action: manipulation;
            padding-top: env(safe-area-inset-top, 20px);
        }
        
        input, select, textarea, button { font-size: 16px !important; }

        .content-width {
            width: 92%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        #sticky-header {
            position: sticky;
            top: env(safe-area-inset-top, 20px);
            z-index: 50;
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2rem;
            box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.1);
        }

        /* Layout Reduzido: Gráfico à esquerda, Texto à direita */
        .shrunk #dashboard-card {
            padding: 0.5rem 1rem !important;
            border-radius: 1.5rem;
        }

        .shrunk #dashboard-inner {
            flex-direction: row !important;
            justify-content: space-between !important;
            align-items: center !important;
        }

        .shrunk #score-svg-container {
            width: 50px !important;
            height: 50px !important;
            margin-bottom: 0 !important;
            margin-left: 0 !important;
        }

        .shrunk #score-val {
            font-size: 1rem !important;
        }

        .shrunk #dashboard-title, 
        .shrunk #score-msg, 
        .shrunk #stats-row {
            display: none !important;
        }

        .shrunk #mini-info {
            display: flex !important;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
            flex: 1;
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.6s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .fluid-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: #ffe4e6;
            border-radius: 20px;
            outline: none;
        }

        .fluid-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, var(--primary-orange), var(--primary-pink));
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3);
        }

        .nav-btn.active {
            color: var(--primary-pink);
            background: #fff1f2;
        }

        .calendar-day {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .day-indicator { width: 5px; height: 5px; border-radius: 50%; margin-top: 2px; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .meal-card { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-36">

    <!-- ABA: HOJE (DIÁRIO) -->
    <div id="view-today" class="view-section space-y-4">
        
        <header class="content-width flex justify-between items-center pt-4 pb-2">
            <div>
                <h1 class="text-2xl font-black bg-gradient-to-r from-orange-500 to-pink-600 bg-clip-text text-transparent">Acompanhamento</h1>
                <p id="display-date" class="text-xs text-slate-400 font-bold uppercase tracking-tight"></p>
            </div>
            <button onclick="resetDaily()" class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-md text-orange-600 border border-orange-200 active:scale-95 transition-all z-50">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
        </header>

        <!-- DASHBOARD STICKY -->
        <div id="sticky-header" class="content-width">
            <div id="dashboard-card" class="glass-card p-6 transition-all duration-300">
                <h2 id="dashboard-title" class="text-[10px] font-black text-center text-slate-400 uppercase tracking-[0.2em] mb-4">Disciplina Diária</h2>
                
                <div id="dashboard-inner" class="flex flex-col items-center justify-center w-full">
                    <!-- Gráfico circular (Esquerda no modo shrunk) -->
                    <div id="score-svg-container" class="relative w-36 h-36 mb-2 transition-all duration-300">
                        <svg class="w-full h-full" viewBox="0 0 100 100">
                            <circle class="text-orange-50" stroke-width="10" stroke="currentColor" fill="transparent" r="42" cx="50" cy="50" />
                            <circle id="score-circle" class="text-pink-500 progress-ring-circle" stroke-width="10" stroke-dasharray="263.89" stroke-dashoffset="263.89" stroke-linecap="round" stroke="currentColor" fill="transparent" r="42" cx="50" cy="50" />
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span id="score-val" class="text-4xl font-black text-slate-800 tracking-tighter transition-all">0%</span>
                            <span id="score-msg" class="text-[9px] font-bold uppercase text-pink-400">Status</span>
                        </div>
                    </div>

                    <!-- Informações (Direita no modo shrunk) -->
                    <div id="mini-info" class="hidden">
                        <span id="mini-status-text" class="text-[10px] font-black uppercase text-pink-500">Nota Final</span>
                        <div class="flex flex-col text-[11px] font-bold text-slate-600 leading-tight">
                            <span id="mini-attainment">Ating.: 0%</span>
                            <span id="mini-penalty" class="text-red-500">Saídas: 0</span>
                        </div>
                    </div>
                </div>

                <div id="stats-row" class="mt-4 pt-4 border-t border-slate-100 flex justify-around">
                    <div class="text-center">
                        <p id="stats-raw" class="text-lg font-black text-orange-500 leading-none">0%</p>
                        <p class="text-[8px] font-bold text-slate-400 uppercase mt-1">Atingimento</p>
                    </div>
                    <div class="text-center">
                        <p id="stats-penalty" class="text-lg font-black text-red-500 leading-none">0%</p>
                        <p class="text-[8px] font-bold text-slate-400 uppercase mt-1">Penalidade</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- REFEIÇÕES E METAS -->
        <div id="meals-container" class="content-width space-y-3"></div>

        <!-- SAÍDAS -->
        <div class="content-width glass-card p-5 border-2 border-dashed border-orange-200">
            <h3 class="font-bold text-sm text-slate-700 mb-3 flex items-center gap-2">🍔 Saídas da Dieta <span class="text-[9px] text-red-400 font-black">(-10% CADA)</span></h3>
            <div class="flex gap-2">
                <input type="text" id="slip-input" placeholder="O que escapou?" class="flex-1 px-4 py-2.5 rounded-xl ring-1 ring-slate-100 focus:ring-pink-400 outline-none text-sm bg-white/50">
                <button onclick="addSlip()" class="bg-gradient-to-r from-orange-500 to-pink-500 text-white px-5 rounded-xl font-bold shadow-md active:scale-95 text-sm">Add</button>
            </div>
            <div id="slips-list" class="mt-3 space-y-2"></div>
        </div>

        <!-- ANOTAÇÕES -->
        <div class="content-width glass-card p-5 shadow-sm">
            <h3 class="font-bold text-sm text-slate-700 mb-2 flex items-center gap-2">📝 Anotações do Dia</h3>
            <textarea id="notes-input" oninput="saveNotes()" placeholder="Ex: Treino concluído, muita sede..." class="w-full bg-slate-50 border-none ring-1 ring-slate-100 rounded-xl p-3 text-sm focus:ring-pink-400 outline-none h-24 transition-all"></textarea>
        </div>
    </div>

    <!-- ABA: HISTÓRICO -->
    <div id="view-history" class="view-section content-width hidden py-6">
        <header class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Histórico</h1>
                <p class="text-sm text-slate-500 font-medium">Sua evolução semanal</p>
            </div>
            <div class="text-right bg-white p-2 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-[9px] font-black text-slate-400 uppercase">Média Geral</p>
                <p id="global-avg" class="text-xl font-black text-pink-600 leading-none">0%</p>
            </div>
        </header>
        
        <div class="glass-card p-5 shadow-lg mb-6">
            <div class="flex justify-between items-center mb-6">
                <h3 id="cal-month-title" class="font-black text-slate-700 capitalize">Mês</h3>
                <div class="flex gap-2">
                    <button onclick="navMonth(-1)" class="p-2 bg-slate-50 rounded-lg transition">‹</button>
                    <button onclick="navMonth(1)" class="p-2 bg-slate-50 rounded-lg transition">›</button>
                </div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 text-center"></div>
        </div>

        <div id="history-detail" class="hidden glass-card p-6 animate-in fade-in space-y-4">
            <div class="flex justify-between items-start">
                <div>
                    <p id="det-date" class="text-[10px] font-black text-slate-400 uppercase"></p>
                    <h4 class="text-2xl font-black text-slate-800" id="det-score">0%</h4>
                    <p class="text-[10px] font-bold text-slate-400" id="det-math"></p>
                </div>
                <div class="flex flex-col gap-2 items-end">
                    <div id="det-status-chip" class="px-3 py-1 rounded-full text-[9px] font-bold text-white uppercase tracking-widest">Status</div>
                    <button id="edit-past-btn" class="text-[10px] font-bold text-pink-500 underline uppercase">Editar dia</button>
                </div>
            </div>
            
            <div id="det-meals-grid" class="grid grid-cols-1 gap-2 border-t pt-4"></div>

            <div id="det-notes-section" class="border-t pt-4 hidden">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Anotações</p>
                <p id="det-notes-text" class="text-xs text-slate-600 italic"></p>
            </div>

            <div id="det-slips-section" class="border-t pt-4 hidden">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Saídas</p>
                <div id="det-slips-list" class="flex flex-wrap gap-2"></div>
            </div>
        </div>
    </div>

    <!-- NAVEGAÇÃO -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 content-width px-1 z-50">
        <div class="glass-card shadow-2xl p-1.5 flex items-center bg-white/95 w-full">
            <button onclick="loadDay(new Date())" id="tab-today" class="nav-btn active flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl transition-all">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="text-[9px] font-black uppercase">Diário</span>
            </button>
            <button onclick="changeTab('history')" id="tab-history" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl transition-all text-slate-300">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span class="text-[9px] font-black uppercase">Histórico</span>
            </button>
        </div>
    </nav>

    <script>
        const STORAGE_KEY = 'diet_tracker_v16_storage';
        
        // CONFIGURAÇÃO DE PESOS (Total 100%)
        const METAS_CONFIG = [
            { id: 'cafe', name: 'Café da Manhã', icon: '☕', weight: 20 },
            { id: 'colacao', name: 'Colação', icon: '🍎', weight: 10 },
            { id: 'almoco', name: 'Almoço', icon: '🍛', weight: 25 },
            { id: 'lanche15', name: 'Lanche 15h', icon: '🥪', weight: 10 },
            { id: 'jantar', name: 'Jantar', icon: '🍲', weight: 25 },
            { id: 'agua', name: 'Água', icon: '💧', weight: 5 },
            { id: 'exercicio', name: 'Exercício', icon: '🏋️‍♂️', weight: 5 }
        ];

        let database = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        let viewMonth = new Date();
        let currentEditingKey = '';

        // FUNÇÃO DE DATA LOCAL (Resolve o erro de pular o dia)
        function getDayKey(d) { 
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        window.addEventListener('scroll', () => {
            const header = document.getElementById('sticky-header');
            if (window.scrollY > 40) header.classList.add('shrunk');
            else header.classList.remove('shrunk');
        });

        function calculateScores(data) {
            if (!data) return { rawAttainment: 0, penalty: 0, finalScore: 0 };
            let totalWeighted = 0;
            METAS_CONFIG.forEach(m => {
                const progress = data.meals?.[m.id]?.progress || 0;
                totalWeighted += (progress / 100) * m.weight;
            });
            const rawAttainment = Math.round(totalWeighted);
            const penalty = (data.slips?.length || 0) * 10;
            const finalScore = Math.max(0, rawAttainment - penalty);
            return { rawAttainment, penalty, finalScore };
        }

        function save() {
            const scores = calculateScores(database[currentEditingKey]);
            database[currentEditingKey].score = scores.finalScore;
            database[currentEditingKey].rawAttainment = scores.rawAttainment;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(database));
            updateScoresUI();
        }

        function updateScoresUI() {
            const data = database[currentEditingKey];
            const { rawAttainment, penalty, finalScore } = calculateScores(data);
            const circ = 263.89; 
            
            document.getElementById('score-circle').style.strokeDashoffset = circ - (finalScore / 100 * circ);
            document.getElementById('score-val').innerText = `${finalScore}%`;
            document.getElementById('stats-raw').innerText = `${rawAttainment}%`;
            document.getElementById('stats-penalty').innerText = `-${penalty}%`;
            document.getElementById('mini-attainment').innerText = `Ating.: ${rawAttainment}%`;
            document.getElementById('mini-penalty').innerText = `Saídas: ${data.slips.length}`;

            const msg = document.getElementById('score-msg');
            if (finalScore >= 75) { msg.innerText = "Excelente!"; msg.style.color = "#10b981"; }
            else if (finalScore >= 50) { msg.innerText = "Bom!"; msg.style.color = "#f59e0b"; }
            else { msg.innerText = "Foco!"; msg.style.color = "#ef4444"; }
        }

        function renderDailyView() {
            const dateObj = new Date(currentEditingKey + 'T12:00:00');
            const isToday = currentEditingKey === getDayKey(new Date());
            document.getElementById('display-date').innerText = isToday ? 'Hoje' : dateObj.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
            
            const container = document.getElementById('meals-container');
            container.innerHTML = '';
            const data = database[currentEditingKey];

            METAS_CONFIG.forEach(item => {
                const iData = data.meals[item.id] || { progress: 0 };
                const card = document.createElement('div');
                card.className = `glass-card p-5 meal-card`;
                card.innerHTML = `
                    <div class="flex items-center gap-3 mb-3">
                        <span class="text-xl">${item.icon}</span>
                        <div class="flex-1">
                            <div class="flex justify-between items-center">
                                <h4 class="font-bold text-slate-700 text-sm">${item.name}</h4>
                                <span class="text-[9px] font-black text-slate-400 bg-slate-100 px-1.5 rounded-full uppercase">Peso: ${item.weight}%</span>
                            </div>
                            <p class="text-[10px] font-black text-slate-300 uppercase">Atingimento: <span class="item-perc text-orange-500">${iData.progress}</span>%</p>
                        </div>
                    </div>
                    <input type="range" min="0" max="100" step="5" value="${iData.progress}" class="fluid-slider" oninput="window.liveUpdate('${item.id}', this.value)" onchange="window.saveProgress()">
                `;
                container.appendChild(card);
            });
            document.getElementById('notes-input').value = data.notes || '';
            renderSlipsList();
        }

        function renderSlipsList() {
            const list = document.getElementById('slips-list');
            list.innerHTML = '';
            database[currentEditingKey].slips.forEach(s => {
                list.innerHTML += `<div class="flex justify-between items-center bg-white/60 p-3 rounded-xl border border-orange-50 text-xs shadow-sm"><span class="font-bold text-slate-600">${s.text}</span><button onclick="window.removeSlip(${s.id})" class="text-pink-400 p-1 font-bold">✕</button></div>`;
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('cal-month-title');
            const keys = Object.keys(database);
            const globalAvg = keys.length ? Math.round(keys.reduce((acc, k) => acc + (database[k].score || 0), 0) / keys.length) : 0;
            document.getElementById('global-avg').innerText = `${globalAvg}%`;
            
            grid.innerHTML = '';
            const y = viewMonth.getFullYear(), m = viewMonth.getMonth();
            title.innerText = viewMonth.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
            
            const daysHead = ['D','S','T','Q','Q','S','S'];
            daysHead.forEach(d => grid.innerHTML += `<div class="text-[9px] font-black text-slate-300 uppercase mb-2">${d}</div>`);

            const first = new Date(y, m, 1).getDay(), total = new Date(y, m + 1, 0).getDate();
            for (let i = 0; i < first; i++) grid.appendChild(document.createElement('div'));

            for (let d = 1; d <= total; d++) {
                const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const data = database[key];
                const day = document.createElement('div');
                day.className = "calendar-day bg-white shadow-sm border border-slate-50";
                day.innerHTML = `<span>${d}</span><div class="day-indicator"></div>`;
                const indicator = day.querySelector('.day-indicator');
                if (data) {
                    const s = data.score || 0;
                    if (s >= 75) { day.style.backgroundColor = '#ecfdf5'; day.style.borderColor = '#10b981'; day.style.color = '#065f46'; indicator.style.backgroundColor = '#10b981'; }
                    else if (s >= 50) { day.style.backgroundColor = '#fffbeb'; day.style.borderColor = '#f59e0b'; day.style.color = '#92400e'; indicator.style.backgroundColor = '#f59e0b'; }
                    else { day.style.backgroundColor = '#fef2f2'; day.style.borderColor = '#ef4444'; day.style.color = '#991b1b'; indicator.style.backgroundColor = '#ef4444'; }
                    day.onclick = () => showDetail(key, data);
                } else day.classList.add('opacity-30', 'text-slate-400');
                grid.appendChild(day);
            }
        }

        function showDetail(key, data) {
            const det = document.getElementById('history-detail');
            det.classList.remove('hidden');
            document.getElementById('det-date').innerText = new Date(key + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
            const final = data.score || 0, raw = data.rawAttainment || 0, penalty = raw - final;
            document.getElementById('det-score').innerText = `${final}% Disciplina`;
            document.getElementById('det-math').innerText = `Ating.: ${raw}% | Pen.: -${penalty}%`;
            
            const mealsGrid = document.getElementById('det-meals-grid');
            mealsGrid.innerHTML = '';
            METAS_CONFIG.forEach(m => {
                const val = data.meals?.[m.id]?.progress || 0;
                mealsGrid.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl"><div class="flex items-center gap-2"><span>${m.icon}</span><span class="text-xs font-bold text-slate-600">${m.name}</span></div><span class="text-xs font-black text-orange-500">${val}%</span></div>`;
            });

            const ns = document.getElementById('det-notes-section');
            if(data.notes) { ns.classList.remove('hidden'); document.getElementById('det-notes-text').innerText = data.notes; }
            else ns.classList.add('hidden');

            const ss = document.getElementById('det-slips-section'), sl = document.getElementById('det-slips-list');
            sl.innerHTML = '';
            if (data.slips?.length > 0) { ss.classList.remove('hidden'); data.slips.forEach(s => sl.innerHTML += `<span class="px-2 py-1 bg-red-50 text-red-600 text-[10px] font-bold rounded-full border border-red-100">${s.text}</span>`); }
            else ss.classList.add('hidden');
            
            document.getElementById('edit-past-btn').onclick = () => loadDay(new Date(key + 'T12:00:00'));
            det.scrollIntoView({ behavior: 'smooth' });
        }

        window.loadDay = (date) => {
            currentEditingKey = getDayKey(date);
            if (!database[currentEditingKey]) database[currentEditingKey] = { meals: {}, slips: [], notes: '', score: 0, rawAttainment: 0 };
            changeTab('today');
            renderDailyView();
            updateScoresUI();
        };

        window.liveUpdate = (id, val) => {
            const card = document.querySelector(`[oninput*="${id}"]`).closest('.meal-card');
            card.querySelector('.item-perc').innerText = val;
            if(!database[currentEditingKey].meals[id]) database[currentEditingKey].meals[id] = { progress: 0 };
            database[currentEditingKey].meals[id].progress = parseInt(val);
            updateScoresUI();
        };

        window.saveProgress = () => save();
        window.saveNotes = () => { 
            database[currentEditingKey].notes = document.getElementById('notes-input').value; 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(database)); 
        };
        
        window.addSlip = () => { 
            const i = document.getElementById('slip-input'); 
            if(i.value.trim()) { 
                database[currentEditingKey].slips.unshift({id: Date.now(), text: i.value.trim()}); 
                i.value=''; renderDailyView(); save(); 
            }
        };
        
        window.removeSlip = (id) => { 
            database[currentEditingKey].slips = database[currentEditingKey].slips.filter(s => s.id !== id); 
            renderDailyView(); save(); 
        };

        window.changeTab = (tab) => {
            const isT = tab === 'today';
            document.getElementById('view-today').classList.toggle('hidden', !isT);
            document.getElementById('view-history').classList.toggle('hidden', isT);
            document.getElementById('tab-today').classList.toggle('active', isT);
            document.getElementById('tab-history').classList.toggle('active', !isT);
            document.getElementById('tab-today').classList.toggle('text-slate-300', !isT);
            document.getElementById('tab-history').classList.toggle('text-slate-300', isT);
            if (!isT) renderCalendar();
        };

        window.navMonth = (dir) => { viewMonth.setMonth(viewMonth.getMonth() + dir); renderCalendar(); };
        window.resetDaily = () => { if(confirm("Deseja zerar os dados registrados para este dia?")) { database[currentEditingKey] = { meals: {}, slips: [], notes: '', score: 0, rawAttainment: 0 }; save(); renderDailyView(); } };

        // Inicializar com o dia de hoje
        loadDay(new Date());
    </script>
</body>
</html>
